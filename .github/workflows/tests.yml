name: Tests & Deploy

on:
  push:
    branches: [main, blackboxai/push-code-engspace]
  pull_request:
    branches: [main]

jobs:
  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eng-space/frontend
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: eng-space/frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Build
        run: npm run build

  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eng-space/backend
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: eng-space/backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check syntax
        run: node -c src/index.js

  # AI Service Tests
  ai-service-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eng-space/ai-service
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Syntax check
        run: python -m py_compile app.py

  # Deployment (only on main branch)
  deploy:
    needs: [frontend-test, backend-test, ai-service-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy notification
        run: |
          echo "Deployment ready!"
          echo "Frontend: Vercel auto-deploys from GitHub"
          echo "Backend: Render auto-deploys from GitHub"
          echo "AI Service: Render auto-deploys from GitHub"
