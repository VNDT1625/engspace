<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 350px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
    #loading { text-align: center; color: #666; }
    #result { margin-top: 10px; line-height: 1.5; }
    #meaning { font-weight: bold; color: #2563eb; }
    #examples { background: #f8f9fa; padding: 8px; border-radius: 4px; margin: 8px 0; }
    button { width: 100%; padding: 10px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px 0; font-weight: bold; }
    button:hover { background: #059669; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    #login-form { display: none; }
    input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #d1d5db; border-radius: 4px; }
    .status { padding: 8px; border-radius: 4px; margin: 5px 0; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div id="login-form">
    <h3>Đăng nhập EngSpace</h3>
    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Mật khẩu" type="password">
    <button id="login-btn">Đăng nhập</button>
  </div>
  
  <div id="main">
    <h3>🎯 Chọn từ tiếng Anh</h3>
    <p id="instruction">Select text trên trang web, click right → "Giải nghĩa với EngSpace"</p>
    <button id="manual-explain" style="display:none;">Giải nghĩa từ clipboard</button>
  </div>
  
  <div id="loading" style="display:none;">🤖 AI đang giải nghĩa...</div>
  <div id="result" style="display:none;">
    <div id="meaning"></div>
    <div id="synonyms"></div>
    <div id="examples"></div>
    <button id="save-btn">💾 Lưu từ để ôn tập</button>
  </div>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
